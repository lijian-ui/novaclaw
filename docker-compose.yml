version: "3.8"

services:
  jeeves:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: jeeves
    ports:
      # Nginx 监听 80 端口，对外暴露
      - "80:80"
    volumes:
      # 配置文件目录（持久化）
      - ./data/config:/data/jeeves/config
      # 数据目录（会话、记忆等）
      - ./data/data:/data/jeeves/data
    environment:
      - TZ=Asia/Shanghai
      - JEEVES_CONFIG_DIR=/data/jeeves/config
      - JEEVES_DATA_DIR=/data/jeeves/data
    restart: unless-stopped
