version: "3.8"

services:
  novaclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: novaclaw
    ports:
      # Nginx 监听 80 端口，对外暴露
      - "80:80"
    volumes:
      # 配置文件目录（持久化）
      - ./data/config:/data/novaclaw/config
      # 数据目录（会话、记忆等）
      - ./data/data:/data/novaclaw/data
    environment:
      - TZ=Asia/Shanghai
      - NOVACLAW_CONFIG_DIR=/data/novaclaw/config
      - NOVACLAW_DATA_DIR=/data/novaclaw/data
    restart: unless-stopped
